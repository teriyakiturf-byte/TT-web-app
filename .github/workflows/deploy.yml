name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master, claude/init-project-qCWH6]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Arrange dist for deployment
        run: |
          # React app shell → app.html (tools app)
          mv dist/index.html dist/app.html
          # Landing page → index.html (site root / SEO entry point)
          mv dist/landing.html dist/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
