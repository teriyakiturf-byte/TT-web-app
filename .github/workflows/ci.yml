name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run build
        # Placeholder values so `prisma generate` + `next build` compile in CI.
        # These are NOT secrets and are never used at runtime.
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/db"
          NEXTAUTH_SECRET: "ci-placeholder-not-a-secret"
          NEXTAUTH_URL: "http://localhost:3000"
