      <stop offset="0%"   stop-color="#3DAA52"/>
      <stop offset="100%" stop-color="#1B5E35"/>
    </linearGradient>
    <linearGradient id="lfFront" x1="90" y1="2" x2="138" y2="56" gradientUnits="userSpaceOnUse">
